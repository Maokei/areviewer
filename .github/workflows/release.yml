name: Release TypeScript App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch: # Allows manual triggering of the workflow

permissions:
  contents: write

jobs:
  release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      # Uncomment the step below once you have tests defined in package.json
      # - name: Run Tests
      #   run: npm test

      - name: Commit and Push Built Assets to Tag
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f dist
          git commit -m "build: compile assets for release [skip ci]"
          git push origin HEAD:${{ github.ref }} --force

      - name: Archive Production Build
        run: zip -r dist.zip dist package.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist.zip
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
